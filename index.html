<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NPCMike Tools</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1b1b1f;
        --muted: #6b6b76;
        --line: #e5e5ee;
        --accent: #6965db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 64px 20px;
        background:
          radial-gradient(circle at 1px 1px, rgba(122, 122, 122, 0.12) 1px, transparent 0) 0 0 / 22px 22px,
          linear-gradient(135deg, rgba(224, 223, 255, 0.35), transparent 42%),
          #fafafc;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      }
      header { text-align: center; }
      h1 { font-size: 26px; margin: 0 0 6px; letter-spacing: 0.2px; }
      header p { color: var(--muted); margin: 0; font-size: 14px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
        width: 100%;
        max-width: 720px;
      }
      .card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px 18px 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 8px 20px rgba(0, 0, 0, 0.04);
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
      }
      .card:hover {
        transform: translateY(-3px);
        border-color: #d6d5ff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05), 0 14px 30px rgba(105, 101, 219, 0.12);
      }
      .card .emoji { font-size: 24px; }
      .card strong { display: block; margin: 10px 0 4px; font-size: 16px; }
      .card span { color: var(--muted); font-size: 13px; line-height: 1.5; }
      footer { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>NPCMike Tools</h1>
      <p>自製小工具集</p>
    </header>

    <main class="grid">
      <a class="card" href="mind/">
        <span class="emoji">🧠</span>
        <strong>Mind Map Studio</strong>
        <span>手繪風心智圖編輯器，匯出 PNG / SVG / JSON。</span>
      </a>
      <!-- 之後新增工具：複製上面的 <a class="card" href="工具資料夾/"> 區塊 -->
    </main>

    <footer>tool.npcmike.com</footer>
  </body>
</html>
