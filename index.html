<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NPCMike Tools</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #202124;
        --surface: #2a2b2f;
        --surface-hover: #303137;
        --ink: #d6d6db;
        --bright: #e9e9ef;
        --muted: #9595a2;
        --line: rgba(255, 255, 255, 0.09);
        --accent: #c2455c;
        --mono: "IBM Plex Mono", "BlexMono Nerd Font", ui-monospace, "Cascadia Code",
          Menlo, Consolas, monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans TC",
          "Microsoft JhengHei", sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        padding: 72px 20px;
        background:
          radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.04) 1px, transparent 0)
            0 0 / 22px 22px,
          radial-gradient(1100px 520px at 50% -12%, rgba(162, 49, 52, 0.12), transparent 62%),
          var(--bg);
        color: var(--ink);
        font-family: var(--sans);
      }
      header { text-align: center; }
      h1 {
        font-family: var(--mono);
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin: 0 0 8px;
        color: var(--bright);
      }
      header p { color: var(--muted); margin: 0; font-size: 13px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
        width: 100%;
        max-width: 720px;
      }
      .card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px 18px 16px;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease,
          background 140ms ease;
      }
      .card:hover {
        transform: translateY(-3px);
        background: var(--surface-hover);
        border-color: rgba(194, 69, 92, 0.55);
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.45);
      }
      .card .emoji { font-size: 24px; }
      .card strong {
        font-family: var(--mono);
        display: block;
        margin: 10px 0 5px;
        font-size: 15px;
        font-weight: 600;
        color: var(--bright);
      }
      .card span { color: var(--muted); font-size: 13px; line-height: 1.55; }
      footer { color: var(--muted); font-size: 12px; font-family: var(--mono); }
    </style>
  </head>
  <body>
    <header>
      <h1>NPCMike Tools</h1>
      <p>自製小工具集</p>
    </header>

    <main class="grid">
      <a class="card" href="mind/">
        <span class="emoji">🧠</span>
        <strong>Mind Map Studio</strong>
        <span>手繪風心智圖編輯器，匯出 PNG / SVG / JSON。</span>
      </a>
      <!-- 之後新增工具：複製上面的 <a class="card" href="工具資料夾/"> 區塊 -->
    </main>

    <footer>tool.npcmike.com</footer>
  </body>
</html>
